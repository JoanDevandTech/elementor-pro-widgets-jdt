name: AI Discord Review

on:
  push:
    branches:
      - main

jobs:
  review-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get Diff and Call OpenAI
        id: ai_step
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 1. Obtener el diff (limitado a 7000 chars)
          DIFF=$(git diff HEAD^ HEAD | head -c 7000)

          # 2. Construir el JSON de forma segura con jq
          JSON_PAYLOAD=$(jq -n \
            --arg diff "$DIFF" \
            --arg system "Eres 'Claude Senior Reviewer', un agente experto en revisión de código. Tu objetivo es realizar una revisión técnica profunda siguiendo estos principios: 1. CONTEXTO DE REVISIÓN: Analiza el DIFF proporcionado. No comentes sobre estilo (espacios, comas) a menos que sea crítico. Enfócate en: Lógica de negocio, Seguridad (OWASP), Rendimiento y Mantenibilidad. 2. FORMATO DE RESPUESTA (Discord Optimized): Usa un tono profesional pero directo. Si encuentras un error grave, usa el emoji 🚨. Si es una sugerencia de mejora, usa 💡. Proporciona un ejemplo de código corregido si la solución es compleja. 3. REGLA DE ORO: Si el código es excelente, felicita al desarrollador brevemente. No generes ruido innecesario. Responde en español." \
            --arg user_prefix "Analiza técnicamente este commit a la rama principal (main). Expón riesgos, sugiere mejoras y valida la integridad del cambio:

" \
            '{
              model: "gpt-4o",
              max_tokens: 2048,
              messages: [
                { role: "system", content: $system },
                { role: "user", content: ($user_prefix + $diff) }
              ]
            }')

          # 3. Llamada a la API de OpenAI
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "content-type: application/json" \
            -d "$JSON_PAYLOAD")

          # 4. Extraer texto con manejo de errores
          ANALYSIS=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'choices' in data and len(data['choices']) > 0:
              print(data['choices'][0]['message']['content'])
          elif 'error' in data:
              print('Error de OpenAI API: ' + data['error'].get('message', str(data['error'])))
          else:
              print('Respuesta inesperada de la API: ' + json.dumps(data)[:500])
          ")

          # 5. Guardar para el siguiente paso
          {
            echo "ANALYSIS<<EOF"
            echo "$ANALYSIS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Send to Discord
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "Análisis AI sobre el último commit"
          description: "${{ env.ANALYSIS }}"
          color: 0x7289da
